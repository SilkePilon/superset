name: Sync Upstream

on:
    schedule:
        # Run daily at 08:00 UTC
        - cron: "0 8 * * *"
    workflow_dispatch: # Allow manual trigger

jobs:
    sync-upstream:
        runs-on: ubuntu-latest
        steps:
            - name: Sync fork with upstream and create/update PR
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const upstream = { owner: "superset-sh", repo: "superset" };
                      const fork = { owner: "SilkePilon", repo: "superset" };

                      const { data: upstreamRepo } = await github.rest.repos.get(upstream);
                      const { data: forkRepo } = await github.rest.repos.get(fork);
                      const upstreamBranch = upstreamRepo.default_branch;
                      const forkBranch = forkRepo.default_branch;

                      // Get latest upstream release info (optional, for PR description)
                      let releaseInfo = "";
                      try {
                        const { data: release } = await github.rest.repos.getLatestRelease(upstream);
                        const notes = release.body || "_No release notes provided._";
                        releaseInfo = [
                          `## Latest Upstream Release: [${release.name || release.tag_name}](${release.html_url})`,
                          "",
                          `**Tag:** \`${release.tag_name}\``,
                          `**Published:** ${release.published_at}`,
                          "",
                          "---",
                          "",
                          "### Release Notes",
                          "",
                          notes,
                        ].join("\n");
                      } catch {
                        releaseInfo = "_No upstream releases found._";
                      }

                      // Compare upstream to fork to see if there are changes
                      let comparison;
                      try {
                        const { data } = await github.rest.repos.compareCommits({
                          ...fork,
                          base: forkBranch,
                          head: `superset-sh:${upstreamBranch}`,
                        });
                        comparison = data;
                      } catch (err) {
                        console.log("Could not compare branches:", err.message);
                        return;
                      }

                      if (comparison.total_commits === 0) {
                        console.log("Fork is already up to date with upstream.");
                        return;
                      }

                      console.log(`Upstream is ${comparison.total_commits} commits ahead.`);

                      const prTitle = "chore: sync with upstream";
                      const prBody = [
                        releaseInfo,
                        "",
                        "---",
                        "",
                        `**${comparison.total_commits} new commits** from upstream \`${upstreamBranch}\`.`,
                        "",
                        "_This PR is automatically created and updated daily to keep the fork in sync with [superset-sh/superset](https://github.com/superset-sh/superset)._",
                      ].join("\n");

                      // Check for an existing open sync PR
                      const { data: openPRs } = await github.rest.pulls.list({
                        ...fork,
                        state: "open",
                        head: `superset-sh:${upstreamBranch}`,
                        base: forkBranch,
                      });

                      const existingPR = openPRs.find((pr) => pr.title === prTitle);

                      if (existingPR) {
                        // Update the existing PR description
                        await github.rest.pulls.update({
                          ...fork,
                          pull_number: existingPR.number,
                          body: prBody,
                        });
                        console.log(`Updated existing PR #${existingPR.number}: ${existingPR.html_url}`);
                      } else {
                        // Create a new PR
                        try {
                          const { data: pr } = await github.rest.pulls.create({
                            ...fork,
                            title: prTitle,
                            body: prBody,
                            head: `superset-sh:${upstreamBranch}`,
                            base: forkBranch,
                          });
                          console.log(`Created PR #${pr.number}: ${pr.html_url}`);
                        } catch (err) {
                          if (err.status === 422) {
                            console.log("PR already exists or no diff to sync.");
                          } else {
                            throw err;
                          }
                        }
                      }
