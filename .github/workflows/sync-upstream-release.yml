name: Sync Upstream

on:
    schedule:
        # Run daily at 08:00 UTC
        - cron: "0 8 * * *"
    workflow_dispatch: # Allow manual trigger

permissions:
    contents: write
    pull-requests: write

jobs:
    sync-upstream:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout fork
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.PAT_TOKEN }}

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Fetch upstream and update sync branch
              id: sync
              run: |
                  git remote add upstream https://github.com/superset-sh/superset.git || true
                  git fetch upstream

                  UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}')
                  FORK_BRANCH=$(git remote show origin | grep 'HEAD branch' | awk '{print $NF}')

                  echo "upstream_branch=$UPSTREAM_BRANCH" >> "$GITHUB_OUTPUT"
                  echo "fork_branch=$FORK_BRANCH" >> "$GITHUB_OUTPUT"

                  # Check if there are new commits
                  AHEAD=$(git rev-list --count origin/$FORK_BRANCH..upstream/$UPSTREAM_BRANCH)
                  echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"

                  if [ "$AHEAD" -eq "0" ]; then
                    echo "Fork is already up to date."
                    exit 0
                  fi

                  echo "$AHEAD new commits from upstream."

                  # Create or update the sync branch from upstream
                  git checkout -B upstream-sync upstream/$UPSTREAM_BRANCH
                  git push origin upstream-sync --force

            - name: Create or update PR
              if: steps.sync.outputs.ahead != '0'
              uses: actions/github-script@v7
              env:
                  FORK_BRANCH: ${{ steps.sync.outputs.fork_branch }}
                  AHEAD: ${{ steps.sync.outputs.ahead }}
              with:
                  github-token: ${{ secrets.PAT_TOKEN }}
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const forkBranch = process.env.FORK_BRANCH;
                      const ahead = process.env.AHEAD;

                      // Fetch latest release info inline to avoid interpolation issues
                      let releaseInfo = "_No upstream releases found._";
                      try {
                        const { data: release } = await github.rest.repos.getLatestRelease({
                          owner: "superset-sh",
                          repo: "superset",
                        });
                        const notes = release.body || "_No release notes provided._";
                        releaseInfo = [
                          `## Latest Upstream Release: [${release.name || release.tag_name}](${release.html_url})`,
                          "",
                          `**Tag:** \`${release.tag_name}\``,
                          `**Published:** ${release.published_at}`,
                          "",
                          "---",
                          "",
                          "### Release Notes",
                          "",
                          notes,
                        ].join("\n");
                      } catch {}

                      const prTitle = "chore: sync with upstream";
                      const prBody = [
                        releaseInfo,
                        "",
                        "---",
                        "",
                        `**${ahead} new commits** from upstream.`,
                        "",
                        "_This PR is automatically created and updated daily to keep the fork in sync with [superset-sh/superset](https://github.com/superset-sh/superset)._",
                      ].join("\n");

                      // Check for existing open PR from upstream-sync branch
                      const { data: openPRs } = await github.rest.pulls.list({
                        owner,
                        repo,
                        state: "open",
                        head: `${owner}:upstream-sync`,
                        base: forkBranch,
                      });

                      if (openPRs.length > 0) {
                        const existingPR = openPRs[0];
                        await github.rest.pulls.update({
                          owner,
                          repo,
                          pull_number: existingPR.number,
                          title: prTitle,
                          body: prBody,
                        });
                        console.log(`Updated PR #${existingPR.number}: ${existingPR.html_url}`);
                      } else {
                        const { data: pr } = await github.rest.pulls.create({
                          owner,
                          repo,
                          title: prTitle,
                          body: prBody,
                          head: "upstream-sync",
                          base: forkBranch,
                        });
                        console.log(`Created PR #${pr.number}: ${pr.html_url}`);
                      }
